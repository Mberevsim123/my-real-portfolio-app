{% extends 'base.html' %}

{% block title %}404 - Page Not Found{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8 text-center">
            <div class="error-code mb-4">
                <h1 class="display-1 fw-bold text-primary">404</h1>
            </div>
            <h2 class="fw-bold mb-3">Page Not Found</h2>
            <p class="lead mb-4">The page you're looking for doesn't exist or has been moved.</p>
            <div class="mt-4">
                <a href="{% url 'portfolio:home' %}" class="btn btn-primary me-2">
                    <i class="fas fa-home me-2"></i>Back to Home
                </a>
                <a href="{% url 'portfolio:contact' %}" class="btn btn-outline-primary">
                    <i class="fas fa-envelope me-2"></i>Contact Support
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
