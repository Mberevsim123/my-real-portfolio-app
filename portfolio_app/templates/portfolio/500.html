{% extends 'base.html' %}

{% block title %}500 - Server Error{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8 text-center">
            <div class="error-code mb-4">
                <h1 class="display-1 fw-bold text-danger">500</h1>
            </div>
            <h2 class="fw-bold mb-3">Server Error</h2>
            <p class="lead mb-4">Something went wrong on our end. Please try again later.</p>
            <div class="mt-4">
                <a href="{% url 'portfolio:home' %}" class="btn btn-primary me-2">
                    <i class="fas fa-home me-2"></i>Back to Home
                </a>
                <a href="{% url 'portfolio:contact' %}" class="btn btn-outline-primary">
                    <i class="fas fa-envelope me-2"></i>Report Issue
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
