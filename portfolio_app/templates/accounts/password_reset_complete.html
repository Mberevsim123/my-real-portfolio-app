{% extends 'base.html' %}

{% block title %}Password Reset Complete - Backend Portfolio{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-success text-white">
                    <h4 class="mb-0"><i class="fas fa-check-circle me-2"></i>Password Reset Complete</h4>
                </div>
                <div class="card-body text-center">
                    <i class="fas fa-unlock-alt fa-4x text-success mb-3"></i>
                    <p>Your password has been set. You may go ahead and log in now.</p>
                    <hr>
                    <a href="{% url 'accounts:login' %}" class="btn btn-primary">Login Now</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
